name: monie
description: "AI Chatbot - Ultra Modern Chat Experience"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  animated_text_kit: ^4.2.3
  cached_network_image: ^3.4.1
  chopper: ^8.5.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_markdown: ^0.7.7+1
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  record: ^6.2.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.12.2
  chopper_generator: ^8.6.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.0
  swagger_dart_code_generator: ^4.1.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
